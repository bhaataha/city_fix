version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cityfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cityfix
      POSTGRES_PASSWORD: cityfix_dev
      POSTGRES_DB: cityfix
    ports:
      - "5488:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityfix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cityfix-redis
    restart: unless-stopped
    ports:
      - "6388:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cityfix-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: cityfix_minio
      MINIO_ROOT_PASSWORD: cityfix_minio_secret
    ports:
      - "9088:9000"
      - "9089:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
